<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穿搭日志 · 文文的衣橱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --bg-soft: rgba(255, 251, 247, 0.78);
  --card: rgba(255, 255, 255, 0.88);
  --card-strong: rgba(255, 255, 255, 0.96);
  --text: #2c2420;
  --text-light: #8a7e76;
  --accent: #c4956a;
  --accent-light: #f0dcc8;
  --accent-dark: #a67b52;
  --accent-glow: rgba(196, 149, 106, 0.24);
  --highlight: #e8c5a0;
  --border: rgba(237, 230, 221, 0.92);
  --border-strong: rgba(223, 207, 192, 0.92);
  --shadow: rgba(180, 160, 140, 0.14);
  --shadow-soft: 0 18px 44px rgba(180, 160, 140, 0.16);
  --today: #c4956a;
  --has-outfit: #d4a574;
  --suitcase-bg: #f5ede3;
  --mint: rgba(215, 239, 229, 0.8);
  --peach: rgba(255, 224, 214, 0.9);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  background: var(--bg);
}

body {
  font-family: "Noto Sans SC", sans-serif;
  background:
    radial-gradient(circle at 12% 16%, rgba(255, 220, 210, 0.66), transparent 24%),
    radial-gradient(circle at 88% 10%, rgba(248, 213, 159, 0.36), transparent 22%),
    linear-gradient(180deg, #fffaf6 0%, #f8efe8 48%, #f9f3ed 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: auto;
  pointer-events: none;
  z-index: 0;
  border-radius: 999px;
  filter: blur(58px);
  opacity: 0.58;
}

body::before {
  width: 280px;
  height: 220px;
  top: 88px;
  left: -72px;
  background: rgba(255, 214, 203, 0.54);
}

body::after {
  width: 260px;
  height: 220px;
  right: -80px;
  bottom: 140px;
  background: rgba(221, 241, 232, 0.48);
}

.top-bar,
.stats-bar,
.calendar-section,
.suitcase-section,
.overlay {
  position: relative;
  z-index: 1;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px 16px;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 247, 240, 0.78), rgba(245, 255, 250, 0.68));
  border-bottom: 1px solid rgba(236, 228, 218, 0.8);
  backdrop-filter: blur(18px);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 14px 34px rgba(180, 160, 140, 0.08);
}

.brand-cluster {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  width: 46px;
  height: 46px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, rgba(255, 238, 230, 0.96), rgba(255, 252, 248, 0.86), rgba(221, 243, 233, 0.76));
  border: 1px solid rgba(236, 220, 207, 0.92);
  box-shadow: 0 14px 28px rgba(196, 149, 106, 0.16);
}

.brand-mark svg {
  width: 22px;
  height: 22px;
  fill: #9f7251;
}

.brand-copy {
  min-width: 0;
}

.brand-copy h1 {
  font-family: "Playfair Display", serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.brand-copy .subtitle {
  font-size: 11px;
  color: var(--text-light);
  font-weight: 300;
  margin-top: 2px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.mode-toggle {
  display: flex;
  align-items: center;
  background: rgba(248, 241, 234, 0.9);
  border: 1px solid rgba(234, 224, 213, 0.92);
  border-radius: 999px;
  padding: 4px;
  gap: 4px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.mode-btn {
  padding: 8px 14px;
  border: none;
  border-radius: 999px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  background: transparent;
  color: var(--text-light);
  transition: transform 0.24s ease, background-color 0.24s ease, color 0.24s ease, box-shadow 0.24s ease;
  white-space: nowrap;
}

.mode-btn.active {
  background: linear-gradient(135deg, var(--accent) 0%, #d6a87e 100%);
  color: #fff;
  box-shadow: 0 10px 20px rgba(196, 149, 106, 0.28);
}

.stats-bar {
  display: flex;
  gap: 12px;
  padding: 18px 20px 8px;
  overflow-x: auto;
}

.stat-chip {
  flex-shrink: 0;
  min-width: 116px;
  padding: 12px 16px;
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 250, 246, 0.82));
  border-radius: 18px;
  border: 1px solid rgba(237, 230, 221, 0.94);
  box-shadow: 0 12px 30px rgba(180, 160, 140, 0.12);
  backdrop-filter: blur(18px);
}

.stat-chip .stat-num {
  font-family: "Playfair Display", serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent-dark);
}

.stat-chip .stat-label {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
}

.calendar-section,
.suitcase-section {
  width: min(100%, 960px);
  margin: 0 auto;
  padding: 16px 20px 28px;
  animation: fadeUp 0.72s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
}

.month-nav button {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--card-strong);
  cursor: pointer;
  font-size: 18px;
  color: var(--text-light);
  transition: transform 0.22s ease, border-color 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
  box-shadow: 0 10px 24px rgba(180, 160, 140, 0.1);
}

.month-nav button:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 16px 28px rgba(196, 149, 106, 0.14);
}

.month-label {
  font-family: "Playfair Display", serif;
  font-size: 24px;
  font-weight: 600;
  min-width: 170px;
  text-align: center;
}

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 10px;
}

.weekday-row span {
  font-size: 11px;
  color: var(--text-light);
  font-weight: 500;
  padding: 8px 0;
  letter-spacing: 0.06em;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

.day-cell {
  aspect-ratio: 1;
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease, border-color 0.28s ease, background-color 0.28s ease;
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(252, 246, 240, 0.82));
  border: 1px solid rgba(239, 229, 219, 0.94);
  box-shadow: 0 8px 20px rgba(180, 160, 140, 0.1);
}

.day-cell::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.26), transparent 54%);
  opacity: 0;
  transition: opacity 0.28s ease;
  pointer-events: none;
}

.day-cell:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 16px 30px rgba(196, 149, 106, 0.16);
  border-color: rgba(212, 176, 145, 0.96);
}

.day-cell:hover::before,
.day-cell.is-focus::before {
  opacity: 1;
}

.day-cell.is-focus {
  border-color: rgba(196, 149, 106, 0.82);
  box-shadow: 0 0 0 3px rgba(196, 149, 106, 0.1), 0 16px 32px rgba(196, 149, 106, 0.16);
}

.day-cell .day-num {
  font-size: 14px;
  font-weight: 500;
  line-height: 1;
}

.day-cell.empty {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
  cursor: default;
}

.day-cell.empty:hover {
  transform: none;
  box-shadow: none;
}

.day-cell.today {
  background: linear-gradient(135deg, #c4956a 0%, #d5a57b 100%);
  color: #fff;
  box-shadow: 0 14px 28px rgba(196, 149, 106, 0.26);
}

.day-cell.today .day-num {
  font-weight: 700;
}

.day-cell.has-outfit::after {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--has-outfit);
  position: absolute;
  bottom: 8px;
  box-shadow: 0 0 0 5px rgba(212, 165, 116, 0.12);
}

.day-cell.today.has-outfit::after {
  background: #fff;
  box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.16);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(44, 36, 32, 0.38);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0 12px;
}

.overlay.show {
  display: flex;
}

.outfit-panel {
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 250, 245, 0.98));
  border-radius: 28px 28px 0 0;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.52s cubic-bezier(0.22, 1, 0.36, 1);
  border: 1px solid rgba(255, 255, 255, 0.56);
  box-shadow: 0 22px 60px rgba(44, 36, 32, 0.18);
}

.overlay.show .outfit-panel {
  transform: translateY(0);
}

.panel-handle {
  width: 42px;
  height: 4px;
  background: rgba(220, 210, 200, 0.92);
  border-radius: 999px;
  margin: 12px auto;
}

.panel-header {
  padding: 8px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.panel-date {
  font-family: "Playfair Display", serif;
  font-size: 24px;
  font-weight: 600;
}

.panel-close {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(248, 240, 234, 0.92);
  cursor: pointer;
  font-size: 18px;
  color: var(--text-light);
}

.outfit-display {
  padding: 0 24px 22px;
}

.outfit-item {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: linear-gradient(145deg, rgba(255, 251, 247, 0.98), rgba(249, 242, 235, 0.88));
  border-radius: 18px;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateX(80px) scale(0.9);
  border: 1px solid rgba(240, 230, 219, 0.92);
  box-shadow: 0 10px 22px rgba(180, 160, 140, 0.08);
}

.outfit-item.fly-in {
  animation: flyIn 0.52s cubic-bezier(0.22, 1.12, 0.36, 1) forwards;
}

@keyframes flyIn {
  from { opacity: 0; transform: translateX(80px) scale(0.9) rotate(3deg); }
  to { opacity: 1; transform: translateX(0) scale(1) rotate(0deg); }
}

.item-thumb {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.54);
}

.item-info {
  flex: 1;
}

.item-info h3 {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
}

.item-info p {
  font-size: 12px;
  color: var(--text-light);
}

.outfit-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 24px 20px;
}

.outfit-tags span {
  padding: 5px 12px;
  background: linear-gradient(135deg, rgba(240, 220, 200, 0.92), rgba(250, 241, 232, 0.94));
  border-radius: 999px;
  font-size: 11px;
  color: var(--accent-dark);
  font-weight: 500;
  border: 1px solid rgba(232, 211, 190, 0.92);
}

.outfit-note {
  margin: 0 24px 24px;
  padding: 16px;
  background: linear-gradient(135deg, rgba(240, 220, 200, 0.92) 0%, rgba(249, 240, 229, 0.96) 100%);
  border-radius: 16px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  border-left: 3px solid var(--accent);
}

.suitcase-section {
  display: none;
}

.suitcase-section.show {
  display: block;
}

.suitcase-header {
  text-align: center;
  margin-bottom: 24px;
}

.suitcase-header h2 {
  font-family: "Playfair Display", serif;
  font-size: 24px;
  margin-bottom: 6px;
}

.suitcase-header p {
  font-size: 13px;
  color: var(--text-light);
}

.trip-setup {
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(255, 249, 244, 0.84));
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(237, 230, 221, 0.94);
  backdrop-filter: blur(18px);
}

.trip-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.trip-row:last-child {
  margin-bottom: 0;
}

.trip-row label {
  font-size: 13px;
  font-weight: 500;
  min-width: 60px;
  color: var(--text-light);
}

.trip-row input,
.trip-row select {
  flex: 1;
  padding: 11px 14px;
  border: 1px solid rgba(235, 225, 214, 0.96);
  border-radius: 14px;
  font-family: inherit;
  font-size: 13px;
  background: rgba(255, 252, 248, 0.92);
  color: var(--text);
  transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
}

.trip-row input:focus,
.trip-row select:focus {
  outline: none;
  border-color: rgba(196, 149, 106, 0.92);
  box-shadow: 0 0 0 4px rgba(196, 149, 106, 0.08);
  transform: translateY(-1px);
}

.generate-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 10px;
  transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
  box-shadow: 0 12px 24px rgba(196, 149, 106, 0.26);
}

.generate-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 16px 28px rgba(196, 149, 106, 0.32);
}

.generate-btn[disabled] {
  cursor: wait;
  opacity: 0.72;
  filter: saturate(0.92);
}

.suitcase-visual {
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 249, 245, 0.84));
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow-soft);
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(237, 230, 221, 0.94);
}

.suitcase-visual::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent-dark), var(--accent));
  border-radius: 24px 24px 0 0;
}

.suitcase-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

.suitcase-title h3 {
  font-size: 15px;
  font-weight: 600;
}

.suitcase-title .count {
  font-size: 12px;
  color: var(--text-light);
  background: rgba(250, 243, 237, 0.92);
  padding: 4px 10px;
  border-radius: 999px;
}

.suitcase-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.suitcase-item {
  background: linear-gradient(145deg, rgba(245, 237, 227, 0.96), rgba(252, 247, 241, 0.84));
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
  opacity: 0;
  transition: all 0.3s;
  border: 1px solid rgba(231, 220, 208, 0.92);
}

.suitcase-item.packed {
  animation: packIn 0.42s cubic-bezier(0.22, 1.12, 0.36, 1) forwards;
}

@keyframes packIn {
  from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

.suitcase-item .item-emoji {
  font-size: 32px;
  margin-bottom: 6px;
}

.suitcase-item .item-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
}

.suitcase-item .item-qty {
  font-size: 10px;
  color: var(--text-light);
  margin-top: 2px;
}

.day-plans {
  margin-top: 20px;
}

.day-plan-card {
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 249, 244, 0.84));
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 10px 24px rgba(180, 160, 140, 0.1);
  border-left: 3px solid var(--accent);
  border: 1px solid rgba(237, 230, 221, 0.88);
}

.day-plan-card h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent-dark);
}

.day-plan-items {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.day-plan-items span {
  padding: 6px 12px;
  background: rgba(250, 243, 237, 0.96);
  border-radius: 12px;
  font-size: 12px;
}

body[data-diary-loading="true"] .stat-chip,
body[data-diary-loading="true"] .trip-setup,
body[data-diary-loading="true"] .suitcase-visual {
  position: relative;
  overflow: hidden;
}

body[data-diary-loading="true"] .stat-chip::after,
body[data-diary-loading="true"] .trip-setup::after,
body[data-diary-loading="true"] .suitcase-visual::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, transparent 32%, rgba(255, 255, 255, 0.66) 48%, transparent 64%);
  transform: translateX(-120%);
  animation: diaryLoading 1.3s ease infinite;
}

@keyframes diaryLoading {
  to { transform: translateX(120%); }
}

@media (max-width: 720px) {
  .top-bar {
    align-items: flex-start;
    flex-direction: column;
  }

  .brand-copy h1 {
    font-size: 20px;
  }

  .mode-toggle {
    width: 100%;
    justify-content: space-between;
  }

  .mode-btn {
    flex: 1;
    text-align: center;
  }

  .calendar-section,
  .suitcase-section {
    padding-left: 16px;
    padding-right: 16px;
  }

  .stats-bar {
    padding-left: 16px;
    padding-right: 16px;
  }

  .trip-row {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
  }

  .trip-row label {
    min-width: 0;
  }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand-cluster">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C9.24 2 7 4.02 7 6.5c0 1.4.65 2.64 1.65 3.5H5.5L6.5 21h11l1-11h-3.15A4.47 4.47 0 0 0 17 6.5C17 4.02 14.76 2 12 2zm0 2c1.38 0 2.5 1.01 2.5 2.5S13.38 9 12 9s-2.5-1.01-2.5-2.5S10.62 4 12 4z"/>
      </svg>
    </div>
    <div class="brand-copy">
      <h1>文文的衣橱</h1>
      <div class="subtitle">Outfit Diary</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('calendar')">📅 日历</button>
    <button class="mode-btn" onclick="switchMode('suitcase')">🧳 行李箱</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-chip"><div class="stat-num">0</div><div class="stat-label">本月记录</div></div>
  <div class="stat-chip"><div class="stat-num">0%</div><div class="stat-label">穿搭率</div></div>
  <div class="stat-chip"><div class="stat-num">0</div><div class="stat-label">最爱单品</div></div>
  <div class="stat-chip"><div class="stat-num">0</div><div class="stat-label">新入单品</div></div>
</div>

<div class="calendar-section" id="calendarSection">
  <div class="month-nav">
    <button type="button" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button type="button" onclick="changeMonth(1)">›</button>
  </div>
  <div class="weekday-row">
    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div class="suitcase-section" id="suitcaseSection">
  <div class="suitcase-header">
    <h2>🧳 行李箱模式</h2>
    <p>智能规划出行穿搭，一键打包不遗漏</p>
  </div>

  <div class="trip-setup">
    <div class="trip-row">
      <label>✈️ 目的地</label>
      <input type="text" placeholder="例：东京、巴厘岛..." id="tripDest" value="东京">
    </div>
    <div class="trip-row">
      <label>📅 天数</label>
      <select id="tripDays">
        <option>3天2晚</option>
        <option selected>5天4晚</option>
        <option>7天6晚</option>
        <option>10天9晚</option>
      </select>
    </div>
    <div class="trip-row">
      <label>🎯 场景</label>
      <select id="tripScene">
        <option>休闲度假</option>
        <option>商务出行</option>
        <option selected>城市探索</option>
        <option>海岛度假</option>
      </select>
    </div>
    <button class="generate-btn" type="button" onclick="generateSuitcase()">✨ AI 智能打包</button>
  </div>

  <div id="suitcaseResult" style="display:none;">
    <div class="suitcase-visual">
      <div class="suitcase-title">
        <h3>📦 打包清单</h3>
        <span class="count" id="packCount">共 0 类</span>
      </div>
      <div class="suitcase-grid" id="suitcaseGrid"></div>
    </div>

    <div class="day-plans" id="dayPlans"></div>
  </div>
</div>

<div class="overlay" id="outfitOverlay" onclick="closeOverlay(event)">
  <div class="outfit-panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <div class="panel-date" id="panelDate">4月2日 周三</div>
      <button class="panel-close" type="button" onclick="closePanel()">✕</button>
    </div>
    <div class="outfit-display" id="outfitItems"></div>
    <div class="outfit-tags" id="outfitTags"></div>
    <div class="outfit-note" id="outfitNote"></div>
  </div>
</div>

</body>
</html>
