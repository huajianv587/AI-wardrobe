name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      APP_ENV: test
      AI_WARDROBE_ENV_FILE: .env.test.example
      REDIS_URL: redis://127.0.0.1:6379/0
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend test suite
        run: pytest backend/tests -q
      - name: Run backend smoke validation
        run: python backend/scripts/smoke_flow_validation.py
      - name: Run deployment health probe
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8123 > /tmp/ai-wardrobe-backend.log 2>&1 &
          BACKEND_PID=$!
          cleanup() {
            kill $BACKEND_PID
          }
          trap cleanup EXIT
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8123/api/v1/health/live >/dev/null; then
              break
            fi
            sleep 2
          done
          BACKEND_PUBLIC_BASE_URL=http://127.0.0.1:8123 python backend/scripts/deployment_health_probe.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      APP_ENV: test
      AI_WARDROBE_ENV_FILE: .env.test.example
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser E2E
        working-directory: frontend
        run: npm run test:e2e
