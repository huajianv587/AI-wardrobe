name: ${COMPOSE_PROJECT_NAME:-ai-wardrobe-models}

x-vllm-logging: &vllm-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

services:
  vllm-recommender:
    profiles: ["recommender"]
    image: ${VLLM_DOCKER_IMAGE:-vllm/vllm-openai}:${VLLM_DOCKER_TAG:-latest}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_RECOMMENDER_MODEL_PATH:-/models/llm-recommender}
      - --served-model-name
      - ${VLLM_RECOMMENDER_SERVED_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      - --max-model-len
      - ${VLLM_RECOMMENDER_MAX_MODEL_LEN:-4096}
      - --gpu-memory-utilization
      - ${VLLM_RECOMMENDER_GPU_MEMORY_UTILIZATION:-0.92}
      - --dtype
      - ${VLLM_RECOMMENDER_DTYPE:-bfloat16}
      - --generation-config
      - ${VLLM_GENERATION_CONFIG_MODE:-vllm}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ../../model_training/checkpoints:/models
      - ../../model_training/cache/hf:/root/.cache/huggingface
    ports:
      - "${VLLM_RECOMMENDER_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s
    shm_size: "16gb"
    gpus: all
    logging: *vllm-logging
    restart: unless-stopped

  vllm-multimodal:
    profiles: ["multimodal"]
    image: ${VLLM_DOCKER_IMAGE:-vllm/vllm-openai}:${VLLM_DOCKER_TAG:-latest}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MULTIMODAL_MODEL_PATH:-Qwen/Qwen2.5-VL-7B-Instruct}
      - --served-model-name
      - ${VLLM_MULTIMODAL_SERVED_MODEL_NAME:-Qwen/Qwen2.5-VL-7B-Instruct}
      - --max-model-len
      - ${VLLM_MULTIMODAL_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_MULTIMODAL_GPU_MEMORY_UTILIZATION:-0.90}
      - --dtype
      - ${VLLM_MULTIMODAL_DTYPE:-bfloat16}
      - --generation-config
      - ${VLLM_GENERATION_CONFIG_MODE:-vllm}
      - --limit-mm-per-prompt
      - ${VLLM_MULTIMODAL_LIMIT_MM_PER_PROMPT:-image=1}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ../../model_training/checkpoints:/models
      - ../../model_training/cache/hf:/root/.cache/huggingface
    ports:
      - "${VLLM_MULTIMODAL_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 180s
    shm_size: "16gb"
    gpus: all
    logging: *vllm-logging
    restart: unless-stopped

  model-gateway:
    image: nginx:stable-alpine
    profiles: ["gateway"]
    depends_on:
      vllm-recommender:
        condition: service_started
    ports:
      - "${MODEL_GATEWAY_PORT:-8088}:80"
    volumes:
      - ../nginx/nginx.model-serving.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *vllm-logging
    restart: unless-stopped
