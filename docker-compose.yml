services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LLM_RECOMMENDER_API_URL: ${LLM_RECOMMENDER_API_URL:-http://llm-recommender:9001}
      AI_CLEANUP_API_URL: ${AI_CLEANUP_API_URL:-http://image-processor:9002}
      MODEL_USE_LOCAL_LLM_RECOMMENDER: ${MODEL_USE_LOCAL_LLM_RECOMMENDER:-false}
      MODEL_USE_LOCAL_IMAGE_CLEANUP: ${MODEL_USE_LOCAL_IMAGE_CLEANUP:-false}
    volumes:
      - ./backend/data:/app/data
      - ./model_training:/app/model_training
    depends_on:
      - redis
      - minio
      - llm-recommender
      - image-processor
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5).status == 200 else sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TASK_QUEUE_ENABLED: ${TASK_QUEUE_ENABLED:-true}
    command: ["python", "worker.py"]
    volumes:
      - ./backend/data:/app/data
      - ./model_training:/app/model_training
    depends_on:
      - redis
      - backend

  llm-recommender:
    build:
      context: ./ai-services/llm-recommender
    ports:
      - "9001:9001"
    env_file:
      - .env
    environment:
      LLM_RECOMMENDER_MODEL_NAME: ${LLM_RECOMMENDER_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      LLM_RECOMMENDER_MODEL_PATH: ${LLM_RECOMMENDER_MODEL_PATH:-/app/model_training/checkpoints/llm-recommender}
      LLM_RECOMMENDER_DATASET_DIR: ${LLM_RECOMMENDER_DATASET_DIR:-/app/model_training/datasets/llm-recommender}
      LLM_RECOMMENDER_RUN_MODE: ${LLM_RECOMMENDER_RUN_MODE:-heuristic}
    volumes:
      - ./model_training:/app/model_training
      - ./training:/app/training

  image-processor:
    build:
      context: ./ai-services/image-processor
    ports:
      - "9002:9002"
    env_file:
      - .env
    environment:
      IMAGE_PROCESSOR_PRIMARY_MODEL: ${IMAGE_PROCESSOR_PRIMARY_MODEL:-briaai/RMBG-2.0}
      IMAGE_PROCESSOR_UPSCALER_MODEL: ${IMAGE_PROCESSOR_UPSCALER_MODEL:-xinntao/Real-ESRGAN}
      IMAGE_PROCESSOR_MODEL_PATH: ${IMAGE_PROCESSOR_MODEL_PATH:-/app/model_training/checkpoints/image-processor}
      IMAGE_PROCESSOR_RUN_MODE: ${IMAGE_PROCESSOR_RUN_MODE:-passthrough}
    volumes:
      - ./model_training:/app/model_training
      - ./training:/app/training

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
